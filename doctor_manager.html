<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Care Hospital - Doctor Manager Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* ➕ Form Style */
        .admin-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            width: 380px;
            border-top: 5px solid #10b981;
        }

        .admin-panel h3 { margin-top: 0; color: #333; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.9rem; margin-bottom: 5px; color: #64748b; }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .button-row { display: flex; gap: 10px; }

        .btn {
            flex: 1;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add { background: #10b981; }
        .btn-update { background: #f59e0b; display: none; } /* ආරම්භයේදී හංගා ඇත */
        .btn-delete { background: #ef4444; margin-top: 10px; width: 100%; }

        .btn:hover { opacity: 0.9; }

        /* 🗂️ Card Style */
        .doctor-card-container {
            background: #ffffff;
            width: 380px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            overflow: hidden;
            border-top: 5px solid #2563eb;
        }

        .card-header { background: #f8fafc; padding: 20px; border-bottom: 1px solid #eee; }
        .card-header h2 { margin: 0; color: #333; font-size: 1.4rem; }

        .profile-section { padding: 30px 20px; position: relative; }
        
        .edit-badge {
            position: absolute; top: 10px; right: 10px;
            background: #e2e8f0; padding: 5px 10px; border-radius: 5px;
            font-size: 0.7rem; cursor: pointer; color: #475569;
        }

        .img-circle {
            width: 120px; height: 120px; border-radius: 50%;
            background: #e2e8f0; margin: 0 auto 20px;
            border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .img-circle img { width: 100%; height: 100%; object-fit: cover; }

        .doc-name { font-size: 1.5rem; color: #1e293b; margin: 10px 0; font-weight: 700; }
        .doc-specialty {
            display: inline-block; background: #dbeafe; color: #2563eb;
            padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: 600;
        }

        .nav-controls { display: flex; justify-content: space-around; padding: 20px; background: #f8fafc; }
        .btn-nav {
            background-color: #2563eb; color: white; border: none;
            padding: 10px 20px; border-radius: 6px; cursor: pointer;
            font-weight: 600; min-width: 110px;
        }
        .btn-nav:disabled { background-color: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- 1. Admin Control Panel (Add & Update) -->
    <div class="admin-panel">
        <h3 id="form-title">Add New Doctor</h3>
        <div class="input-group">
            <label>Doctor's Name</label>
            <input type="text" id="doc-input-name" placeholder="Ex: Dr. Sunimal Silva">
        </div>
        <div class="input-group">
            <label>Specialty</label>
            <input type="text" id="doc-input-specialty" placeholder="Ex: Cardiologist">
        </div>
        
        <div class="button-row">
            <button class="btn btn-add" id="add-btn" onclick="addNewDoctor()">Add Doctor</button>
            <button class="btn btn-update" id="save-update-btn" onclick="saveUpdate()">Save Changes</button>
        </div>
        
        <button class="btn btn-delete" onclick="deleteDoctor()">Delete This Doctor</button>
    </div>

    <!-- 2. Doctor Viewer Card -->
    <div class="doctor-card-container">
        <div class="card-header">
            <h2>City Care Hospital</h2>
            <small style="color: #64748b;" id="count-info">Available Specialists</small>
        </div>
        
        <div class="profile-section">
            <div class="edit-badge" onclick="loadToUpdate()">Edit Info</div>
            <div class="img-circle">
                <img id="display-img" src="" alt="Doctor Image">
            </div>
            <div class="doc-name" id="display-name">Loading...</div>
            <div class="doc-specialty" id="display-specialty">Specialty</div>
        </div>
        
        <div class="nav-controls">
            <button class="btn-nav" id="prev-btn" onclick="prevDoctor()">Previous</button>
            <button class="btn-nav" id="next-btn" onclick="nextDoctor()">Next</button>
        </div>
    </div>

<script>
    let doctors = [
        { name: "Dr. Amal Perera", specialty: "Cardiologist", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Amal" },
        { name: "Dr. Nimali Silva", specialty: "Dermatologist", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Nimali" },
        { name: "Dr. Kasun Fernando", specialty: "Pediatrician", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Kasun" }
    ];

    let currentIndex = 0;

    // --- 1. ADD FUNCTION ---
    function addNewDoctor() {
        const name = document.getElementById('doc-input-name').value;
        const spec = document.getElementById('doc-input-specialty').value;

        if(!name || !spec) return alert("Fields cannot be empty!");

        doctors.push({
            name: name,
            specialty: spec,
            img: `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`
        });

        clearInputs();
        currentIndex = doctors.length - 1;
        updateUI();
    }

    // --- 2. UPDATE FUNCTIONS ---
    // දැනට ඉන්න කෙනාව edit කරන්න form එකට ගන්නවා
    function loadToUpdate() {
        document.getElementById('doc-input-name').value = doctors[currentIndex].name;
        document.getElementById('doc-input-specialty').value = doctors[currentIndex].specialty;
        
        document.getElementById('form-title').innerText = "Update Doctor Info";
        document.getElementById('add-btn').style.display = "none";
        document.getElementById('save-update-btn').style.display = "block";
    }

    // වෙනස්කම් ටික save කරනවා
    function saveUpdate() {
        const name = document.getElementById('doc-input-name').value;
        const spec = document.getElementById('doc-input-specialty').value;

        doctors[currentIndex].name = name;
        doctors[currentIndex].specialty = spec;
        doctors[currentIndex].img = `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`;

        alert("Updated Successfully!");
        resetForm();
        updateUI();
    }

    // --- 3. DELETE FUNCTION ---
    function deleteDoctor() {
        if(doctors.length === 1) return alert("At least one doctor must remain!");
        
        if(confirm(`Are you sure you want to delete ${doctors[currentIndex].name}?`)) {
            doctors.splice(currentIndex, 1); // Array එකෙන් ඉවත් කිරීම
            
            // Index එක හරිගැස්වීම
            if(currentIndex >= doctors.length) {
                currentIndex = doctors.length - 1;
            }
            
            updateUI();
            resetForm();
        }
    }

    // --- HELPER FUNCTIONS ---
    function updateUI() {
        if(doctors.length > 0) {
            document.getElementById('display-name').innerText = doctors[currentIndex].name;
            document.getElementById('display-specialty').innerText = doctors[currentIndex].specialty;
            document.getElementById('display-img').src = doctors[currentIndex].img;
            document.getElementById('count-info').innerText = `Doctor ${currentIndex + 1} of ${doctors.length}`;

            document.getElementById('prev-btn').disabled = (currentIndex === 0);
            document.getElementById('next-btn').disabled = (currentIndex === doctors.length - 1);
        }
    }

    function resetForm() {
        clearInputs();
        document.getElementById('form-title').innerText = "Add New Doctor";
        document.getElementById('add-btn').style.display = "block";
        document.getElementById('save-update-btn').style.display = "none";
    }

    function clearInputs() {
        document.getElementById('doc-input-name').value = "";
        document.getElementById('doc-input-specialty').value = "";
    }

    function nextDoctor() {
        if (currentIndex < doctors.length - 1) {
            currentIndex++;
            updateUI();
            resetForm();
        }
    }

    function prevDoctor() {
        if (currentIndex > 0) {
            currentIndex--;
            updateUI();
            resetForm();
        }
    }

    updateUI();
</script>

</body>
</html>
