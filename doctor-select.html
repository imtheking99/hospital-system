<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Care Hospital - Select Doctor</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .doctor-card-container {
            background: #ffffff;
            width: 380px;
            padding: 0;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            overflow: hidden;
            border-top: 5px solid #2563eb;
        }

        .card-header {
            background: #f8fafc;
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .card-header h2 {
            margin: 0;
            color: #333;
            font-size: 1.4rem;
        }

        .profile-section {
            padding: 30px 20px;
        }

        .img-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #e2e8f0;
            margin: 0 auto 20px;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .img-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .doc-name {
            font-size: 1.5rem;
            color: #1e293b;
            margin: 10px 0;
            font-weight: 700;
        }

        .doc-specialty {
            display: inline-block;
            background: #dbeafe;
            color: #2563eb;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .nav-controls {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #f8fafc;
        }

        .btn-nav {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            min-width: 110px;
        }

        .btn-nav:hover {
            background-color: #1d4ed8;
        }

        .btn-nav:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        .appointment-btn {
            display: block;
            width: 80%;
            margin: 0 auto 20px;
            background: #10b981;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        .appointment-btn:hover {
            background: #059669;
        }
    </style>
</head>
<body>

<div class="doctor-card-container">
    <div class="card-header">
        <h2>City Care Hospital</h2>
        <small style="color: #64748b;">Available Specialists</small>
    </div>
    
    <div class="profile-section">
        <div class="img-circle">
            <img id="doc-img" src="" alt="Doctor Image">
        </div>
        <div class="doc-name" id="doc-name">Loading...</div>
        <div class="doc-specialty" id="doc-specialty">Specialty</div>
        
        <a href="#" class="appointment-btn">Channel Now</a>
    </div>
    
    <div class="nav-controls">
        <button class="btn-nav" id="prev-btn" onclick="prevDoctor()">Previous</button>
        <button class="btn-nav" id="next-btn" onclick="nextDoctor()">Next</button>
    </div>
</div>

<script>
    // මෙතනට තමයි අලුත් Doctors ලාව එකතු කරන්නේ
    const doctors = [
        { name: "Dr. Amal Perera", specialty: "Cardiologist", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Amal" },
        { name: "Dr. Nimali Silva", specialty: "Dermatologist", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Nimali" },
        { name: "Dr. Kasun Fernando", specialty: "Pediatrician", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Kasun" },
        { name: "Dr. Saman Kumara", specialty: "Neurologist", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Saman" },
        // අලුතින් එකතු කළ doctor මෙන්න:
        { name: "Dr. Priyantha Bandara", specialty: "Surgeon", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Priyantha" }
    ];

    let currentIndex = 0;

    function updateUI() {
        document.getElementById('doc-name').innerText = doctors[currentIndex].name;
        document.getElementById('doc-specialty').innerText = doctors[currentIndex].specialty;
        document.getElementById('doc-img').src = doctors[currentIndex].img;

        document.getElementById('prev-btn').disabled = (currentIndex === 0);
        document.getElementById('next-btn').disabled = (currentIndex === doctors.length - 1);
    }

    function nextDoctor() {
        if (currentIndex < doctors.length - 1) {
            currentIndex++;
            updateUI();
        }
    }

    function prevDoctor() {
        if (currentIndex > 0) {
            currentIndex--;
            updateUI();
        }
    }

    updateUI();
</script>

</body>
</html>
